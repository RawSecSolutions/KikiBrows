<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Compras | KikiBrows</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/account.css">
    <style>
        .main-navbar {
            margin-bottom: 0 !important;
        }
        #main-layout {
            padding-top: 2rem;
        }
        #content-area {
            padding-top: 30px !important;
        }
    </style>
</head>
<body>

    <div id="header-component"></div>

    <div id="main-layout">
        <main id="content-area" class="container" style="max-width: 900px;">

            <!-- Botón Regresar -->
            <div class="mb-3">
                <a href="javascript:history.back()" class="btn btn-kiki btn-sm">
                    <i class="fas fa-arrow-left me-2"></i>Regresar
                </a>
            </div>

            <!-- Header del Dashboard -->
            <div class="dashboard-header mb-4">
                <div>
                    <h2 class="fw-bold mb-1" style="color: var(--text-dark); text-align: left;">Mis Compras</h2>
                    <p class="text-muted mb-0">Historial de transacciones realizadas.</p>
                </div>
            </div>

            <div id="purchases-list" class="d-flex flex-column gap-3"></div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="module" src="js/authGuard.js"></script>
    <script type="module" src="js/componentsAlumn.js"></script>

    <script type="module" src="js/historialCompras.js"></script>
</body>
</html>
