<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Certificados | KikiBrows</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/account.css">
    <style>
        .main-navbar {
            margin-bottom: 0 !important;
        }
        #main-layout {
            padding-top: 160px;
        }
        #content-area {
            padding-top: 30px !important;
        }
    </style>
</head>
<body>

    <div id="header-component"></div>

    <div id="main-layout">
        <main id="content-area" class="container" style="max-width: 900px;">

            <!-- Botón Regresar -->
            <div class="mb-3 text-start">
                <a href="javascript:history.back()" class="btn btn-kiki btn-sm">
                    <i class="fas fa-arrow-left me-2"></i>Regresar
                </a>
            </div>

            <!-- Header del Dashboard -->
            <div class="dashboard-header mb-4 text-center">
                <h2 class="fw-bold mb-1" style="color: var(--text-dark);">Mis Certificados</h2>
                <p class="text-muted mb-0">Visualiza y descarga tus diplomas obtenidos.</p>
            </div>

            <div id="certificados-container" class="row g-4 justify-content-center"></div>

            <div id="no-certs-message" class="text-center d-none mt-5">
                <div class="empty-state-container p-5 rounded-4" style="background: rgba(255,255,255,0.9);">
                    <i class="fa-solid fa-graduation-cap fa-4x text-muted mb-4"></i>
                    <h3 class="fw-bold mb-3">No tienes certificados disponibles</h3>
                    <p class="text-muted mb-4">Completa tus cursos al 100% para obtener tus diplomas</p>
                    <a href="cursosAlumn.html" class="btn btn-kiki btn-lg px-5">
                        <i class="fas fa-compass me-2"></i>Ver Mis Cursos
                    </a>
                </div>
            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/authGuard.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
    <script src="js/certificateGenerator.js"></script>
    <script type="module" src="js/componentsAlumn.js"></script>
    <script type="module" src="js/historialCertificados.js"></script>
</body>
</html>
