<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIKIBROWS - Transacciones</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/layoutAdmin.css">
    <link rel="stylesheet" href="css/account.css"> <link rel="stylesheet" href="css/dashboardAdmin.css">
    <link rel="stylesheet" href="css/estiloTabla.css">
    <link rel="stylesheet" href="css/transaccionesAdmin.css">
</head>
<body>
    
    <header id="navbar-global"></header>

    <div id="main-container" class="d-flex">
        <aside id="sidebar"></aside>

        <main id="dashboard-content" class="p-4 w-100">
            <div class="account-card p-4 h-100 d-flex flex-column">

                <div class="toast-container position-fixed bottom-0 end-0 p-3">
                    <div id="transaToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
                        <div class="d-flex">
                            <div class="toast-body" id="transa-toast-msg">Acción realizada.</div>
                            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                        </div>
                    </div>
                </div>

                <div class="d-flex align-items-center mb-4 border-bottom pb-3">
                     <i class="fas fa-wallet me-3 fs-2" style="color: #8A835A;"></i>
                     <h1 class="m-0 fs-3">Transacciones</h1>
                </div>
                
                <div class="mb-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <div class="dropdown">
                        <select id="month-filter" class="form-select border" style="background-color: rgba(255,255,255,0.6); border-color: #8A835A;">
                            <option value="all">Todos los Meses</option>
                        </select>
                    </div>

                    <!-- Buscador Inteligente -->
                    <div class="search-box" style="flex: 1; max-width: 400px;">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0" style="border-color: #8A835A;">
                                <i class="fas fa-search" style="color: #8A835A;"></i>
                            </span>
                            <input
                                type="text"
                                id="transaction-search"
                                class="form-control border-start-0"
                                placeholder="Buscar por nombre, ID o código de autorización..."
                                style="border-color: #8A835A;">
                        </div>
                        <small class="text-muted d-block mt-1">
                            <i class="fas fa-info-circle me-1"></i>
                            Busca por nombre del cliente, ID (#1) o código de autorización bancaria
                        </small>
                    </div>
                </div>

                <div class="table-responsive flex-grow-1">
                    <table class="table table-hover align-middle">
                        <thead style="background-color: #D4E1C5;">
                            <tr>
                                <th scope="col" class="py-3">Producto</th>
                                <th scope="col" class="py-3">Valor</th>
                                <th scope="col" class="py-3">Usuario</th>
                                <th scope="col" class="py-3">Fecha</th>
                                <th scope="col" class="py-3">ID Transacción</th>
                                <th scope="col" class="py-3">Acciones</th> 
                            </tr>
                        </thead>
                        <tbody id="transaction-list">
                        </tbody>
                    </table>
                </div>

                <nav aria-label="Paginación" class="mt-4">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" id="prev-page"><a class="page-link" href="#">Anterior</a></li>
                        <li class="page-item" id="next-page"><a class="page-link text-success" href="#">Siguiente</a></li>
                    </ul>
                </nav>
            </div>
        </main>
    </div>
    
    <div class="modal fade" id="transactionDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content account-card border-0">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title">Detalles de Transacción</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pt-3">
                    <div id="modal-details">
                        <p class="text-center text-muted py-3">Selecciona una transacción para ver los detalles.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/authGuardAdmin.js"></script>
    <script type="module" src="js/componenteAdmin.js"></script>
    <script src="js/dashboardAdmin.js"></script>
    <script type="module" src="js/transaccionesAdmin.js"></script>
</body>
</html>
