<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIKIBROWS - Gestión de Usuarios</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/layoutAdmin.css">
    <link rel="stylesheet" href="css/account.css">
    <link rel="stylesheet" href="css/estiloTabla.css"> 
    <link rel="stylesheet" href="css/dashboardAdmin.css"> 
</head>
<body>
    
    <header id="navbar-global"></header>

    <div id="main-container" class="d-flex">
        <aside id="sidebar"></aside>

        <main class="p-4 w-100" id="dashboard-content">
            <div class="account-card p-4 h-100 position-relative">
                
                <div class="toast-container position-fixed bottom-0 end-0 p-3">
                    <div id="userToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
                        <div class="d-flex">
                            <div class="toast-body" id="toast-msg">Acción realizada.</div>
                            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                        </div>
                    </div>
                </div>

                <div class="d-flex align-items-center mb-4 border-bottom pb-3">
                    <i class="fas fa-users-cog me-3 fs-2 users-gest-icon"></i>
                    <h1 class="m-0 fs-3">Gestión de Usuarios</h1>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
                            <input type="text" id="search-input" class="form-control border-start-0 users-gest-input" placeholder="Buscar por nombre o email...">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <select id="role-filter" class="form-select users-gest-input">
                            <option value="all">Todos los Roles</option>
                            <option value="superadmin">Super Admin</option>
                            <option value="admin">Administrador</option>
                            <option value="student">Estudiante</option>
                        </select>
                    </div>
                </div>

                <div class="user-table-container">
                    <div class="row d-flex align-items-center p-2 mb-2 fw-bold rounded user-table-header">
                        <div class="col-2">Usuario</div>
                        <div class="col-3">Email</div>
                        <div class="col-2">Rol</div>
                        <div class="col-2">Estado</div>
                        <div class="col-1">Cursos</div>
                        <div class="col-2 text-end">Acciones</div>
                    </div>
                    
                    <div id="user-list">
                        </div>
                </div>
            </div>
        </main>
    </div>
    
    <button class="btn position-fixed bottom-0 end-0 m-4 text-white rounded-pill px-4 py-3 shadow btn-nuevo-usuario" id="btn-open-create">
        <i class="fas fa-user-plus me-2"></i> Nuevo Usuario
    </button>

    <div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content account-card border-0">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="modalUserTitle">Crear Usuario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pt-4">
                    <form id="userForm">
                        <input type="hidden" id="userId">
                        <div class="mb-3">
                            <label class="form-label text-muted">Nombre Completo</label>
                            <input type="text" id="userName" class="form-control modal-input-light" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted">Email</label>
                            <input type="email" id="userEmail" class="form-control modal-input-light" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted">Rol</label>
                            <select id="userRole" class="form-select modal-input-light">
                                <option value="admin">Administrador</option>
                                <option value="student" selected>Estudiante</option>
                            </select>
                        </div>

                        <div class="mb-3 p-3 rounded border block-user-section">
                            <div class="d-flex align-items-center justify-content-between">
                                <div>
                                    <label class="form-label fw-bold text-danger mb-1"><i class="fas fa-user-lock me-2"></i>Bloquear Usuario</label>
                                    <div><small class="text-muted block-note">El usuario no podrá acceder a su cuenta</small></div>
                                </div>
                                <div class="form-check form-switch">
                                    <input class="form-check-input block-switch" type="checkbox" id="userBlocked">
                                </div>
                            </div>
                        </div>

                        <div class="mb-3 p-3 rounded assign-course-section">
                            <label class="form-label fw-bold text-success"><i class="fas fa-gift me-2"></i>Asignar Curso (Opcional)</label>
                            <select id="userCourse" class="form-select assign-course-select">
                                <option value="">-- Ninguno --</option>
                                </select>
                            <small class="text-muted assign-course-note">Permite regalar acceso inmediato a un curso.</small>
                        </div>

                        <div class="mb-3" id="passwordGroup">
                            <label class="form-label text-muted">Contraseña</label>
                            <input type="password" id="userPassword" class="form-control modal-input-light" minlength="6" required placeholder="Mínimo 6 caracteres">
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn text-white btn-save-modal" id="btn-save-user">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/authGuardAdmin.js"></script>
    <script type="module" src="js/componenteAdmin.js"></script>
    <script type="module" src="js/funcionalidadTabla.js"></script>
    <script src="js/dashboardAdmin.js"></script> 
</body>
</html>
